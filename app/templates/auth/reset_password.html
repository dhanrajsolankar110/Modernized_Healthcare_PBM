{% extends "auth_layout.html" %}

{% block title %}

Reset Password

{% endblock %}

{% block content %}

<div class="login-container">

    <div class="login-card">

        <div class="login-header">

            <i class="fa-solid fa-lock-open"></i>

            <h2>

                Reset Password

            </h2>

            <p>

                Create a new password for your account.

            </p>

        </div>

        <form

            method="POST"

            id="resetPasswordForm">

            <div class="form-group">

    <label>

        New Password

    </label>

    <div class="password-wrapper">

        <input

            type="password"

            id="password"

            name="password"

            class="form-control"

            placeholder="Enter new password"

            minlength="8"

            required

        >

        <button

            type="button"

            class="password-toggle"

            onclick="togglePassword('password', this)">

            <i class="fa-solid fa-eye"></i>

        </button>

    </div>

    <div class="strength-meter">

        <div

            id="strengthBar"

            class="strength-bar">

        </div>

    </div>

    <small id="strengthText">

        Password Strength

    </small>

</div>

            <br>

            <div class="form-group">

    <label>

        Confirm Password

    </label>

    <div class="password-wrapper">

        <input

            type="password"

            id="confirm_password"

            name="confirm_password"

            class="form-control"

            placeholder="Confirm new password"

            minlength="8"

            required

        >

        <button

            type="button"

            class="password-toggle"

            onclick="togglePassword('confirm_password', this)">

            <i class="fa-solid fa-eye"></i>

        </button>

    </div>

    <small

        id="passwordMatch">

    </small>

</div>

            <br>

            <button

                type="submit"

                class="btn btn-primary w-100">

                <i class="fa-solid fa-key"></i>

                Reset Password

            </button>

        </form>

        <div class="login-footer">

            <a href="{{ url_for('auth.login') }}">

                Back to Login

            </a>

        </div>

    </div>

</div>

{% endblock %}

{% block extra_js %}

<script>

const password=document.getElementById("password");

const confirmPassword=document.getElementById("confirm_password");

const strengthBar=document.getElementById("strengthBar");

const strengthText=document.getElementById("strengthText");

const passwordMatch=document.getElementById("passwordMatch");

password.addEventListener(

"input",

function(){

let value=password.value;

let score=0;

if(value.length>=8) score++;

if(/[A-Z]/.test(value)) score++;

if(/[a-z]/.test(value)) score++;

if(/[0-9]/.test(value)) score++;

if(/[^A-Za-z0-9]/.test(value)) score++;

const colors=[

"#ef4444",

"#f97316",

"#facc15",

"#22c55e",

"#16a34a"

];

const labels=[

"Weak",

"Fair",

"Good",

"Strong",

"Very Strong"

];

strengthBar.style.width=(score*20)+"%";

strengthBar.style.background=colors[Math.max(score-1,0)];

strengthText.innerHTML=

"Strength : "+labels[Math.max(score-1,0)];

});

confirmPassword.addEventListener(

"input",

function(){

if(password.value===confirmPassword.value){

passwordMatch.innerHTML="✔ Passwords match";

passwordMatch.style.color="#16a34a";

}else{

passwordMatch.innerHTML="✖ Passwords do not match";

passwordMatch.style.color="#dc2626";

}

});

function togglePassword(id,button){

const input=document.getElementById(id);

const icon=button.querySelector("i");

if(input.type==="password"){

input.type="text";

icon.classList.remove("fa-eye");

icon.classList.add("fa-eye-slash");

}else{

input.type="password";

icon.classList.remove("fa-eye-slash");

icon.classList.add("fa-eye");

}

}

</script>

{% endblock %}
