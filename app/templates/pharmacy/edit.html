{% extends "dashboard_layout.html" %}

{% block title %}
Edit Medicine
{% endblock %}

{% block extra_css %}

<link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/pharmacy.css') }}">

{% endblock %}

{% block content %}

<div class="pharmacy-form-page">

    <!-- ==========================================
                    PAGE HEADER
    =========================================== -->

    <div class="page-header">

        <div>

            <h1>

                Edit Medicine

            </h1>

            <p>

                Update medicine information.

            </p>

        </div>

        <a
            href="{{ url_for('pharmacy.index') }}"
            class="btn btn-secondary">

            <i class="fa-solid fa-arrow-left"></i>

            Back

        </a>

    </div>

    <!-- ==========================================
                    FORM
    =========================================== -->

    <form
        method="POST"
        class="pharmacy-form">

        <div class="form-card">

            <div class="card-header">

                <i class="fa-solid fa-pen-to-square"></i>

                <h3>

                    Medicine Information

                </h3>

            </div>

            <div class="form-grid">

                <!-- Medicine ID -->

                <div class="form-group">

                    <label>

                        Medicine ID

                    </label>

                    <input
                        type="text"
                        value="{{ medicine.medicine_id }}"
                        readonly>

                </div>

                <!-- Medicine Name -->

                <div class="form-group">

                    <label>

                        Medicine Name <span>*</span>

                    </label>

                    <input
                        type="text"
                        name="medicine_name"
                        value="{{ medicine.medicine_name }}"
                        required>

                </div>

                <!-- Category -->

                <div class="form-group">

                    <label>

                        Category <span>*</span>

                    </label>

                    <select
                        name="category"
                        required>

                        <option value="Tablet"
                        {% if medicine.category=="Tablet" %}selected{% endif %}>
                        Tablet
                        </option>

                        <option value="Capsule"
                        {% if medicine.category=="Capsule" %}selected{% endif %}>
                        Capsule
                        </option>

                        <option value="Syrup"
                        {% if medicine.category=="Syrup" %}selected{% endif %}>
                        Syrup
                        </option>

                        <option value="Injection"
                        {% if medicine.category=="Injection" %}selected{% endif %}>
                        Injection
                        </option>

                        <option value="Cream"
                        {% if medicine.category=="Cream" %}selected{% endif %}>
                        Cream
                        </option>

                    </select>

                </div>

                <!-- Manufacturer -->

                <div class="form-group">

                    <label>

                        Manufacturer <span>*</span>

                    </label>

                    <input
                        type="text"
                        name="manufacturer"
                        value="{{ medicine.manufacturer }}"
                        required>

                </div>

                <!-- Batch Number -->

                <div class="form-group">

                    <label>

                        Batch Number <span>*</span>

                    </label>

                    <input
                        type="text"
                        name="batch_number"
                        value="{{ medicine.batch_number }}"
                        required>

                </div>

                <!-- Expiry Date -->

                <div class="form-group">

                    <label>

                        Expiry Date <span>*</span>

                    </label>

                    <input
                        type="date"
                        name="expiry_date"
                        value="{{ medicine.expiry_date.strftime('%Y-%m-%d') }}"
                        required>

                </div>

                <!-- Stock Quantity -->

                <div class="form-group">

                    <label>

                        Stock Quantity <span>*</span>

                    </label>

                    <input
                        type="number"
                        name="stock_quantity"
                        value="{{ medicine.stock_quantity }}"
                        min="0"
                        required>

                </div>

                <!-- Unit Price -->

                <div class="form-group">

                    <label>

                        Unit Price (₹) <span>*</span>

                    </label>

                    <input
                        type="number"
                        name="unit_price"
                        value="{{ medicine.unit_price }}"
                        min="0"
                        step="0.01"
                        required>

                </div>

                <!-- Supplier -->

                <div class="form-group">

                    <label>

                        Supplier Name <span>*</span>

                    </label>

                    <input
                        type="text"
                        name="supplier_name"
                        value="{{ medicine.supplier_name }}"
                        required>

                </div>

                <!-- Status -->

                <div class="form-group">

                    <label>

                        Status <span>*</span>

                    </label>

                    <select
                        name="status"
                        required>

                        <option value="Available"
                        {% if medicine.status=="Available" %}selected{% endif %}>
                        Available
                        </option>

                        <option value="Low Stock"
                        {% if medicine.status=="Low Stock" %}selected{% endif %}>
                        Low Stock
                        </option>

                        <option value="Out of Stock"
                        {% if medicine.status=="Out of Stock" %}selected{% endif %}>
                        Out of Stock
                        </option>

                    </select>

                </div>

            </div>

        </div>

        <!-- ==========================================
                    ACTION BUTTONS
        =========================================== -->

        <div class="form-actions">

            <button
                type="submit"
                class="btn btn-primary">

                <i class="fa-solid fa-floppy-disk"></i>

                Update Medicine

            </button>

            <a
                href="{{ url_for('pharmacy.index') }}"
                class="btn btn-secondary">

                <i class="fa-solid fa-arrow-left"></i>

                Cancel

            </a>

        </div>

    </form>

</div>

{% endblock %}

{% block extra_js %}

<script src="{{ url_for('static', filename='js/pharmacy.js') }}"></script>

{% endblock %}
