{% extends "dashboard_layout.html" %}

<!-- ==========================================================
                    PAGE TITLE
=========================================================== -->

{% set page_title = "Add Claim" %}

<!-- ==========================================================
                    EXTRA CSS
=========================================================== -->

{% block extra_css %}

<link
rel="stylesheet"
href="{{ url_for('static', filename='css/claim.css') }}">

{% endblock %}

<!-- ==========================================================
                    CONTENT
=========================================================== -->

{% block content %}

<div class="claim-form-page fade-in">

    <!-- ==========================================
                    PAGE HEADER
    =========================================== -->

    <div class="page-header">

        <div>

            <h2>

                Add New Claim

            </h2>

            <p>

                Submit a new healthcare insurance claim.

            </p>

        </div>

        <a
            href="{{ url_for('claim.index') }}"
            class="btn btn-outline">

            <i class="fa-solid fa-arrow-left"></i>

            Back

        </a>

    </div>

    <!-- ==========================================
                    CLAIM FORM
    =========================================== -->

    <form

        method="POST"

        action="{{ url_for('claim.add') }}"

        class="card claim-form">

        <div class="card-header">

            <h3 class="card-title">

                Claim Information

            </h3>

        </div>

        <div class="card-body">

            <div class="form-grid">

                <!-- Claim ID -->

                <div class="form-group">

                    <label class="form-label">

                        Claim ID

                    </label>

                    <input

                        type="text"

                        name="claim_id"

                        class="form-control"

                        placeholder="Enter Claim ID"

                        required>

                </div>

                <!-- Patient -->

                <div class="form-group">

                    <label class="form-label">

                        Patient

                    </label>

                    <select

                        name="patient_id"

                        class="form-control"

                        required>

                        <option value="">

                            Select Patient

                        </option>

                        {% for patient in patients %}

                        <option value="{{ patient.patient_id }}">

                            {{ patient.patient_id }}

                            -

                            {{ patient.first_name }}

                            {{ patient.last_name }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <!-- Hospital -->

                <div class="form-group">

                    <label class="form-label">

                        Hospital Name

                    </label>

                    <input

                        type="text"

                        name="hospital_name"

                        class="form-control"

                        placeholder="Hospital Name"

                        required>

                </div>

                <!-- Doctor -->

                <div class="form-group">

                    <label class="form-label">

                        Doctor Name

                    </label>

                    <input

                        type="text"

                        name="doctor_name"

                        class="form-control"

                        placeholder="Doctor Name"

                        required>

                </div>

                                <!-- Disease -->

                <div class="form-group">

                    <label class="form-label">

                        Disease

                    </label>

                    <input

                        type="text"

                        name="disease"

                        class="form-control"

                        placeholder="Enter Disease"

                        required>

                </div>

                <!-- Claim Amount -->

                <div class="form-group">

                    <label class="form-label">

                        Claim Amount (₹)

                    </label>

                    <input

                        type="number"

                        name="claim_amount"

                        class="form-control"

                        placeholder="Enter Claim Amount"

                        min="0"

                        step="0.01"

                        required>

                </div>

                <!-- Treatment Date -->

                <div class="form-group">

                    <label class="form-label">

                        Treatment Date

                    </label>

                    <input

                        type="date"

                        name="treatment_date"

                        class="form-control"

                        required>

                </div>

                <!-- Claim Status -->

                <div class="form-group">

                    <label class="form-label">

                        Claim Status

                    </label>

                    <select

                        name="status"

                        class="form-control"

                        required>

                        <option value="Pending">

                            Pending

                        </option>

                        <option value="Approved">

                            Approved

                        </option>

                        <option value="Rejected">

                            Rejected

                        </option>

                    </select>

                </div>

            </div>

            <!-- ==========================================
                        Remarks
            =========================================== -->

            <div class="form-group mt-3">

                <label class="form-label">

                    Remarks

                </label>

                <textarea

                    name="remarks"

                    class="form-control"

                    rows="5"

                    placeholder="Enter additional remarks (optional)"></textarea>

            </div>

                    </div>

        <!-- ==========================================
                    FORM ACTIONS
        =========================================== -->

        <div class="card-footer">

            <div class="d-flex gap-2 justify-between w-100">

                <a

                    href="{{ url_for('claim.index') }}"

                    class="btn btn-outline">

                    <i class="fa-solid fa-arrow-left"></i>

                    Cancel

                </a>

                <div class="d-flex gap-2">

                    <button

                        type="reset"

                        class="btn btn-warning">

                        <i class="fa-solid fa-rotate-left"></i>

                        Reset

                    </button>

                    <button

                        type="submit"

                        class="btn btn-success">

                        <i class="fa-solid fa-floppy-disk"></i>

                        Save Claim

                    </button>

                </div>

            </div>

        </div>

    </form>

</div>

{% endblock %}

<!-- ==========================================================
                    EXTRA JAVASCRIPT
=========================================================== -->

{% block extra_js %}

<script src="{{ url_for('static', filename='js/claim.js') }}"></script>

<script>

document.addEventListener("DOMContentLoaded", function(){

    const today = new Date().toISOString().split("T")[0];

    const treatmentDate = document.querySelector(

        'input[name="treatment_date"]'

    );

    if(treatmentDate){

        treatmentDate.max = today;

    }

});

</script>

{% endblock %}
